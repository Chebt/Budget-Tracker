spring:
  application:
    name: budget-tracker
  datasource:
    url: jdbc:h2:file:./data/budgetdb
    username: sa
    password: 
    driverClassName: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
  thymeleaf:
    cache: false

server:
  port: 8080