<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${transaction.id != null} ? 'Edit Transaction' : 'Add Transaction'"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${transaction.id != null} ? 'Edit Transaction' : 'Add New Transaction'"></h1>
        
        <div class="card">
            <form action="/add" method="post">
                <input type="hidden" name="id" th:value="${transaction.id}" />

                <div class="form-group">
                    <label>Description</label>
                    <input type="text" name="description" th:value="${transaction.description}" required>
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" step="0.01" name="amount" th:value="${transaction.amount}" required>
                </div>

                <div class="form-group">
                    <label>Type</label>
                    <select name="type" required>
                        <option value="INCOME" th:selected="${transaction.type == 'INCOME'}">Income</option>
                        <option value="EXPENSE" th:selected="${transaction.type == 'EXPENSE'}">Expense</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select name="category" required>
                        <option value="Needs" th:selected="${transaction.category == 'Needs'}">Needs (50%)</option>
                        <option value="Wants" th:selected="${transaction.category == 'Wants'}">Wants (30%)</option>
                        <option value="Savings" th:selected="${transaction.category == 'Savings'}">Savings (20%)</option>
                        <option value="Other" th:selected="${transaction.category == 'Other'}">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" th:value="${transaction.date}" required>
                </div>

                <button type="submit" class="btn">Save Transaction</button>
                <a href="/" class="btn" style="background:#6b7280;">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
